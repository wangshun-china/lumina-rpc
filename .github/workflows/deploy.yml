            echo "=== Step 3: 删除 lumina 旧镜像 ==="
            # 只删除 wangshun_build 命名空间的镜像，其他镜像不动
            sudo docker images --format "{{.Repository}}:{{.Tag}} {{.ID}}" | \
              grep "wangshun_build" | \
              awk '{print $2}' | \
              sort -u | \
              xargs -r sudo docker rmi -f 2>/dev/null || true
