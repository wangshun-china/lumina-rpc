name: Deploy to Production

on:
  push:
    branches:
      - master  # 监听 master 分支的变动

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: 配置 JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: 全量构建后端 - 强制生成 Fat JAR
      - name: Build backend with Maven
        run: mvn clean package -DskipTests

      # Step 4: 安装 Node.js 并构建前端 (在 GitHub 免费强悍的机器上编译)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build frontend
        run: |
          cd lumina-dashboard
          npm install -g pnpm
          pnpm install
          pnpm build

      # Step 5: 整理部署物料到临时目录 (保证服务器收到的是极简的产物)
      - name: Prepare deployment artifacts
        run: |
          mkdir -p deploy_package
          
          # 拷贝后端可执行 jar
          find . -name "*-exec.jar" -exec cp {} deploy_package/ \;
          
          # 拷贝 Dockerfiles 和 Compose 脚本
          cp docker-compose.yml deploy_package/
          cp Dockerfile.* deploy_package/
          
          # 拷贝前端产物与 Nginx 配置
          mkdir -p deploy_package/lumina-dashboard
          cp -r lumina-dashboard/dist deploy_package/lumina-dashboard/
          cp lumina-dashboard/nginx.conf deploy_package/lumina-dashboard/

      # Step 6: SCP 复制“纯净物料”到服务器 (硬编码密钥版)
      - name: Deploy to Server via SCP
        uses: appleboy/scp-action@master
        with:
          host: "42.193.105.133"
          username: "ubuntu"
          port: 22
          # 极其关键：硬编码私钥，必须保留管道符 `|`，且严格对其
          key: |
            -----BEGIN OPENSSH PRIVATE KEY-----
            b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
            QyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQAAAJi59U1mufVN
            ZgAAAAtzc2gtZWQyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQ
            AAAEAXBYMkCWPdQj8wuwo2sFDpNQkahl9K2g5kJwMOtPhGnSFd/sDtGoodGLTdQl9mBpEz
            6f0W+yhuwtBZNT6Coy2tAAAAETI2MDYyMDkzMDdAcXEuY29tAQIDBA==
            -----END OPENSSH PRIVATE KEY-----
          source: "deploy_package/*"
          target: "/home/ubuntu/lumina-rpc-prod"
          strip_components: 1  # 去掉 deploy_package 这个包裹层，让文件直接铺在生产目录下
          command_timeout: 10m

      # Step 7: 远程执行 Docker Compose (硬编码密钥版)
      - name: Deploy with SSH
        uses: appleboy/ssh-action@master
        with:
          host: "42.193.105.133"
          username: "ubuntu"
          port: 22
          key: |
            -----BEGIN OPENSSH PRIVATE KEY-----
            b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
            QyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQAAAJi59U1mufVN
            ZgAAAAtzc2gtZWQyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQ
            AAAEAXBYMkCWPdQj8wuwo2sFDpNQkahl9K2g5kJwMOtPhGnSFd/sDtGoodGLTdQl9mBpEz
            6f0W+yhuwtBZNT6Coy2tAAAAETI2MDYyMDkzMDdAcXEuY29tAQIDBA==
            -----END OPENSSH PRIVATE KEY-----
          script: |
            echo "Deploying to /home/ubuntu/lumina-rpc-prod..."
            cd /home/ubuntu/lumina-rpc-prod
            
            # 确保拥有操作权限
            sudo chown -R ubuntu:ubuntu .

            # 停止旧容器
            echo "Stopping old containers in prod..."
            sudo docker-compose down || true

            # 重新构建并启动新容器
            echo "Building and starting new containers..."
            sudo docker-compose up -d --build
            
            # 清理无用的虚悬镜像释放磁盘空间
            sudo docker image prune -f

            echo "Deployment completed successfully!"