name: Deploy to Production

on:
  push:
    branches:
      - master

env:
  REGISTRY: crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com
  IMAGE_NAME: wangshun_build/wangshun_build

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: 配置 JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: 全量构建后端 - 生成 Fat JAR
      - name: Build backend with Maven
        run: mvn clean package -DskipTests

      # Step 4: 安装 Node.js 并构建前端
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build frontend
        run: |
          cd lumina-dashboard
          npm install -g pnpm
          pnpm install
          pnpm build

      # Step 5: 登录阿里云仓库
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: aliyun4384550071
          password: wangshun817

      # Step 6: 搬运 Jar 包到根目录 (Dockerfile 需要从根目录 COPY)
      - name: Copy JAR files to root
        run: |
          cp lumina-control-plane/target/lumina-control-plane-exec.jar .
          cp lumina-sample-engine/target/lumina-sample-engine-exec.jar .
          cp lumina-sample-radar/target/lumina-sample-radar-exec.jar .
          cp lumina-sample-command/target/lumina-sample-command-exec.jar .

      # Step 6.1: 搬运前端 dist 和 nginx.conf 到根目录
      - name: Copy frontend files to root
        run: |
          cp -r lumina-dashboard/dist .
          cp lumina-dashboard/nginx.conf .

      # Step 7: 构建并推送后端服务镜像
      # 7.1 Control Plane
      - name: Build and push control-plane
        run: |
          docker build -f Dockerfile.control-plane -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:control-plane .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:control-plane

      # 7.2 Sample Engine
      - name: Build and push engine
        run: |
          docker build -f Dockerfile.sample-engine -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:engine .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:engine

      # 7.3 Sample Radar
      - name: Build and push radar
        run: |
          docker build -f Dockerfile.sample-radar -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:radar .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:radar

      # 7.4 Sample Command
      - name: Build and push command
        run: |
          docker build -f Dockerfile.sample-command -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:command .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:command

      # Step 8: 构建并推送前端 Dashboard 镜像
      - name: Build and push dashboard
        run: |
          docker build -f Dockerfile.front -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dashboard .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dashboard

      # Step 9: 推送 docker-compose.yml 到服务器
      - name: Deploy docker-compose.yml via SCP
        uses: appleboy/scp-action@master
        with:
          host: "42.193.105.133"
          username: "ubuntu"
          port: 22
          key: |
            -----BEGIN OPENSSH PRIVATE KEY-----
            b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
            QyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQAAAJi59U1mufVN
            ZgAAAAtzc2gtZWQyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQ
            AAAEAXBYMkCWPdQj8wuwo2sFDpNQkahl9K2g5kJwMOtPhGnSFd/sDtGoodGLTdQl9mBpEz
            6f0W+yhuwtBZNT6Coy2tAAAAETI2MDYyMDkzMDdAcXEuY29tAQIDBA==
            -----END OPENSSH PRIVATE KEY-----
          source: "docker-compose.yml"
          target: "/home/ubuntu/lumina-rpc-prod"
          command_timeout: 1m

      # Step 10: 远程部署 - 安全清理并顺序启动
      - name: Deploy with SSH
        uses: appleboy/ssh-action@master
        with:
          host: "42.193.105.133"
          username: "ubuntu"
          port: 22
          key: |
            -----BEGIN OPENSSH PRIVATE KEY-----
            b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
            QyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQAAAJi59U1mufVN
            ZgAAAAtzc2gtZWQyNTUxOQAAACAhXf7A7RqKHRi03UJfZgaRM+n9FvsobsLQWTU+gqMtrQ
            AAAEAXBYMkCWPdQj8wuwo2sFDpNQkahl9K2g5kJwMOtPhGnSFd/sDtGoodGLTdQl9mBpEz
            6f0W+yhuwtBZNT6Coy2tAAAAETI2MDYyMDkzMDdAcXEuY29tAQIDBA==
            -----END OPENSSH PRIVATE KEY-----
          script: |
            cd /home/ubuntu/lumina-rpc-prod

            echo "=== Step 1: 登录 ACR ==="
            echo "wangshun817" | sudo docker login crpi-r1wme86kfaw7rr3f.cn-shanghai.personal.cr.aliyuncs.com -u aliyun4384550071 --password-stdin

            echo "=== Step 2: 停止 lumina 相关容器 ==="
            # 只停止当前 docker-compose.yml 里的服务（不会碰其他容器！）
            sudo docker-compose down

            echo "=== Step 3: 删除 lumina 旧镜像 ==="
            # 只删除 wangshun_build 命名空间的镜像，其他镜像不动
            sudo docker images --format "{{.Repository}}:{{.Tag}} {{.ID}}" | \
              grep "wangshun_build" | \
              awk '{print $2}' | \
              sort -u | \
              xargs -r sudo docker rmi -f 2>/dev/null || true
            echo "Old lumina images removed (if any)"

            echo "=== Step 4: 拉取最新镜像 ==="
            sudo docker-compose pull

            echo "=== Step 5: 顺序启动服务 ==="
            # 启动 MySQL
            echo "Starting MySQL..."
            sudo docker-compose up -d mysql
            sleep 15

            # 检查 MySQL
            until sudo docker exec lumina-mysql mysql -ulumina -plumina123 -e "SELECT 1" 2>/dev/null; do
              echo "Waiting for MySQL..."
              sleep 5
            done

            # 启动 Control Plane
            echo "Starting Control Plane..."
            sudo docker-compose up -d control-plane
            sleep 10

            # 启动其他服务
            echo "Starting Engine, Radar, Command..."
            sudo docker-compose up -d

            echo "=== Step 6: 验证状态 ==="
            sudo docker ps | grep lumina

            echo "=== Step 7: 清理虚悬镜像 ==="
            sudo docker image prune -f

            echo "Deployment completed!"