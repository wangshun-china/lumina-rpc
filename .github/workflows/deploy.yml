name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    # 强制注入 Secrets 环境变量
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

    steps:
      # Step 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: 配置 JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: 配置 Node.js 24
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Step 4: 全量构建 - 生成后端 Fat JAR
      - name: Build backend with Maven
        run: mvn clean package -DskipTests

      # Step 5: 诊断性测试 - 检查 secrets
      - name: Check Secrets
        run: |
          echo "Checking if secrets are loaded..."
          if [ -z "${{ env.SSH_HOST }}" ]; then
            echo "ERROR: SSH_HOST is empty!"
            exit 1
          else
            echo "SSH_HOST is loaded: ${{ env.SSH_HOST }}"
          fi

          if [ -z "${{ env.SSH_USER }}" ]; then
            echo "ERROR: SSH_USER is empty!"
            exit 1
          else
            echo "SSH_USER is loaded: ${{ env.SSH_USER }}"
          fi

          if [ -z "${{ env.SSH_PRIVATE_KEY }}" ]; then
            echo "ERROR: SSH_PRIVATE_KEY is empty!"
            exit 1
          else
            echo "SSH_PRIVATE_KEY is loaded (length: ${#SSH_PRIVATE_KEY})"
          fi

      # Step 6: SCP 复制文件到服务器
      - name: Deploy to Server via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: 22
          source: "."
          target: "/home/ubuntu/lumina-app"
          strip_components: 0
          command_timeout: 10m

      # Step 7: 远程执行 Docker Compose
      - name: Deploy with SSH
        uses: appleboy/ssh-action@v0.1.4
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "Deploying to /home/ubuntu/lumina-app..."
            cd /home/ubuntu/lumina-app

            # 确保部署目录有正确的读写权限
            echo "Fixing directory permissions..."
            sudo chown -R ubuntu:ubuntu /home/ubuntu/lumina-app

            # 优雅停止旧容器
            echo "Stopping old containers..."
            sudo docker-compose down

            # 构建并启动新容器
            echo "Building and starting new containers..."
            sudo docker-compose up -d --build

            echo "Deployment completed!"