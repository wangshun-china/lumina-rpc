server {
    listen 80;
    server_name localhost;

    # 1. 强制指定 Docker 内置 DNS 服务器，并设置极短的缓存有效期
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    # 2. 静态文件托管
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 3. 动态代理 Control Plane (必须使用 set 变量黑科技强制重解析)
    location /api/v1/ {
        set $upstream_control_plane "control-plane:8080";
        proxy_pass http://$upstream_control_plane;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 增加超时容忍
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;

        # 错误时尝试下一个（如果有多个 upstream）
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }

    # 兜底：其他 /api 请求也发往 Control Plane
    location /api/ {
        set $upstream_control_plane "control-plane:8080";
        proxy_pass http://$upstream_control_plane;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;
    }

    # 4. 动态代理 Command Gateway
    location /api/command/ {
        set $upstream_command "sample-command:8083";
        proxy_pass http://$upstream_command;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
